<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>소상공인 정책 알리미</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="mainLayout">

    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <span class="brand-icon">🏢</span>
          <span class="brand-name">정책체크</span>
        </div>
        <nav class="nav-tabs">
          <a href="info.html" class="tab-btn">자격안내</a>
          <a href="index.html" class="tab-btn active">공고목록</a>
          <a href="news.html" class="tab-btn">뉴스</a>
          <a href="favorites.html" class="tab-btn">관심공고</a>
        </nav>
      </div>

      <div class="header-body">
        <h1 class="main-title">소상공인<br><em>정책 지원사업</em></h1>
        <p class="main-sub">나에게 맞는 지원사업을 빠르게 확인하세요</p>
        <div class="search-wrap">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" id="searchInput" placeholder="정책명이나 지역을 검색하세요" />
        </div>
      </div>

      <div class="filter-row">
        <div class="toggle-container">
          <button class="toggle-btn active" data-state="open">접수중</button>
          <button class="toggle-btn" data-state="closed">마감</button>
          <div class="toggle-slider"></div>
        </div>
      </div>
    </header>

    <main id="policyList"></main>

  </div>

  <!-- 상세보기 -->
  <div id="detailView" class="detail hidden">
    <button class="back-btn" id="backBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      목록으로
    </button>
    <div class="detail-inner">
      <div class="detail-badge" id="detailBadge">접수중</div>
      <h2 id="detailTitle">-</h2>
      <div class="detail-meta">
        <div class="meta-item">
          <span class="meta-label">지원지역</span>
          <span class="meta-value" id="detailTarget">-</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">마감기한</span>
          <span class="meta-value" id="detailDeadline">-</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">공고처</span>
          <span class="meta-value" id="detailSource">-</span>
        </div>
      </div>
      <div class="detail-actions">
        <a id="detailLink" href="#" target="_blank" class="btn-primary">공고 원문 확인하기</a>
        <button id="detailFavBtn" class="btn-secondary">⭐ 관심 공고 저장</button>
      </div>
    </div>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loader-content">
      <div class="spinner"></div>
      <p>공고 페이지로 이동 중입니다...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
