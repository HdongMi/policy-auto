<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>실시간 뉴스 - 소상공인 정책체크</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .news-wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .news-item {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      box-shadow: var(--shadow-sm);
      animation: fadeUp 0.3s ease both;
    }
    .news-item:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border);
      transform: translateY(-1px);
    }
    .news-item:active { transform: translateY(0); }
    .news-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.45;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      letter-spacing: -0.3px;
    }
    .news-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .news-meta {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    .news-arrow {
      color: var(--text-muted);
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* 스켈레톤 */
    .skeleton-item {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* 로딩 오버레이 */
    #newsOverlay {
      position: fixed; inset: 0;
      background: rgba(244, 243, 240, 0.92);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      flex-direction: column;
    }
    #newsOverlay p {
      margin-top: 16px;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.3px;
    }

    .news-error {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .news-error .error-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
    .news-error p { font-size: 14px; font-weight: 500; line-height: 1.6; }
  </style>
</head>
<body>

  <div id="mainLayout">
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <span class="brand-name">소상공인 정책체크</span>
        </div>
        <nav class="nav-tabs">
          <a href="info.html" class="tab-btn">자격안내</a>
          <a href="index.html" class="tab-btn">공고목록</a>
          <a href="news.html" class="tab-btn active">뉴스</a>
          <a href="favorites.html" class="tab-btn">관심공고</a>
        </nav>
      </div>
      <div class="header-body">
        <h1 class="main-title">실시간<br><em>정책 뉴스</em></h1>
        <p class="main-sub">소상공인 관련 최신 정책 소식을 확인하세요</p>
      </div>
    </header>

    <div id="news-list" class="news-wrap">
      <div class="skeleton-item">
        <div class="skeleton" style="height:16px; width:88%; margin-bottom:10px;"></div>
        <div class="skeleton" style="height:16px; width:60%; margin-bottom:16px;"></div>
        <div class="skeleton" style="height:12px; width:30%;"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton" style="height:16px; width:92%; margin-bottom:10px;"></div>
        <div class="skeleton" style="height:16px; width:50%; margin-bottom:16px;"></div>
        <div class="skeleton" style="height:12px; width:35%;"></div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton" style="height:16px; width:75%; margin-bottom:10px;"></div>
        <div class="skeleton" style="height:12px; width:28%;"></div>
      </div>
    </div>
  </div>

  <div id="newsOverlay">
    <div class="spinner"></div>
    <p>기사 페이지로 이동 중...</p>
  </div>

  <script>
    function openNews(url) {
      const overlay = document.getElementById('newsOverlay');
      overlay.style.display = 'flex';
      setTimeout(() => { window.location.href = url; }, 800);
    }

    async function fetchNews() {
      const newsContainer = document.getElementById('news-list');
      try {
        const query = encodeURIComponent('소상공인 지원정책');
        const rssUrl = encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=ko&gl=KR&ceid=KR:ko`);
        const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
        const data = await response.json();

        if (data.items && data.items.length > 0) {
          newsContainer.innerHTML = '';
          const sorted = data.items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
          sorted.slice(0, 8).forEach((item, i) => {
            const date = new Date(item.pubDate).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
            const el = document.createElement('div');
            el.className = 'news-item';
            el.style.animationDelay = `${i * 0.05}s`;
            el.innerHTML = `
              <div class="news-title">${item.title}</div>
              <div class="news-footer">
                <span class="news-meta">${date}</span>
                <svg class="news-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            `;
            el.onclick = () => openNews(item.link);
            newsContainer.appendChild(el);
          });
        } else {
          throw new Error('No items');
        }
      } catch (e) {
        newsContainer.innerHTML = `
          <div class="news-error">
            <div class="error-icon">📡</div>
            <p>뉴스를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.</p>
          </div>
        `;
      }
    }

    window.onload = fetchNews;
  </script>
</body>
</html>
